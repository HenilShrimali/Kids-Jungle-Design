<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kids Jungle</title>
    <link rel="stylesheet" href="style.css" />
  
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />


  </head>
  <body>
    
    <div>
      <section class="pencilBanner">
        <p>LIMITED TIME OFFERS:</p>
        <b>MID-SEASON SALE UP TO 70% OFF.</b>
        <a href="#" class="shopNow">SHOP NOW.</a>
      </section>

      <section class="header">
        <div class="container">
          <div class="logoContainer">
              <a href="#"><img src="./assets/header/logo.svg" alt="logo" /></a>
          </div>

          <div class="navContainer">
            <div class="navItemContainer">

              <div class="searchBar">
                <input type="search" placeholder="Search for a product....">
                <i class="fa-solid fa-magnifying-glass"></i>
                <span></span>
              </div>

              <div class="contact">
                <img src="./assets/header/phone.svg" alt="">
                <p>123-456-7890</p>
              </div>

              <div class="account">
                <img src="assets/header/user.svg" alt="My Account" />
                <div>
                  <p>My Account</p>
                  <i class="fa fa-angle-down"></i>
                </div>

                <div class="cart">
                  
                  <div class="cartContainer">

                    <img src="./assets/header/cart.svg" alt="">
                    <p>01</p>
                  </div>
                </div>
                  
              </div>

            </div>
            
          </div>
        </div>
      </section>
    </div>

    <div class="navButtonsContainer">
      <ul class="main-nav" style="list-style-type: none;">
            <li class="main-nav-item">
              <div class="desktop-menu">
                <a class="shop-all-a" href="#">
                  <svg version="1.2" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 16 12" width="16" height="12">
                    <path fill="#fff" d="m0 0h16v2h-16zm0 5h14v2h-14zm0 5h11v2h-11z" />
                  </svg>
                  Shop All
                </a>
                <div class="dropdown-content">
                  <a href="#">Item 1</a>
                  <a href="#">Item 2</a>
                  <a href="#">Item 3</a>
                  <a href="#">Item 4</a>
                  <a href="#">Item 5</a>
                  <a href="#">Item 6</a>
                </div>
              </div>
            </li>
            <li class="main-nav-item"><a class="home-a" href="#">Home</a></li>
            <li class="main-nav-item"><a class="boys-a" href="#">Boys</a></li>
            <li class="main-nav-item"><a class="girls-a" href="#">Girls</a></li>
            <li class="main-nav-item"><a class="unisex-a" href="#">Unisex</a></li>
            <li class="main-nav-item"><a class="brands-a" href="#">Brands</a></li>
            <li class="main-nav-item"><a class="about-a" href="#">About</a></li>
            <li class="main-nav-item"><a class="contact-a" href="#">Contact</a></li>
          </ul>

    </div>
      


    </div>



    <script src="script.js"></script>
  </body>
</html>
